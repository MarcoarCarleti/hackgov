spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hackgov
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

app:
  jwt:
    secret: "super-secret-key-super-secret-key-super-secret-key"
    expiration-minutes: 240
